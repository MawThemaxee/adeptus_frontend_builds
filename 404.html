<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA fallback: redirect 404s to index.html preserving the path
      var path = window.location.pathname + window.location.search;
      window.location.replace('/?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
